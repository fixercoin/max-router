<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAX – Decentralized Exchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0B0F1C;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #E6EDF5;
            padding: 0;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0B0F1C;
            border-bottom: 1px solid #1E2A3A;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF 0%, #A0AEC0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }

        .connect-wallet {
            background: #1E293B;
            border: 1px solid #334155;
            color: #F1F5F9;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .connect-wallet:hover {
            background: #2D3A4E;
            border-color: #5B6E8C;
        }

        .wallet-status {
            font-size: 11px;
            color: #8E9BAE;
            margin-top: 6px;
            text-align: right;
        }

        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 100px 24px 48px 24px;
        }

        .dex-card {
            background: #11161F;
            border: 1px solid #232A36;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid #232A36;
        }

        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #8E9BAE;
        }

        .mode-select {
            background: #0B0F1A;
            border: 1px solid #2A3442;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #F1F5F9;
            cursor: pointer;
            font-family: inherit;
            outline: none;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            flex: 1;
            min-width: 160px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 500;
            color: #A0AEC0;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input, select {
            width: 100%;
            background: #0B0F1A;
            border: 1px solid #2A3442;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 12px;
            color: #F1F5F9;
            font-family: inherit;
            outline: none;
        }

        .action-button {
            background: #1E2A3A;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #F1F5F9;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .action-button:hover {
            background: #2D3A4E;
            border-color: #5B6E8C;
        }

        .status-area {
            background: #0A0E15;
            border-radius: 16px;
            padding: 14px;
            margin-top: 20px;
            font-size: 12px;
            font-family: monospace;
            color: #A0B2C6;
            border: 1px solid #1E2A3A;
            max-height: 180px;
            overflow-y: auto;
        }

        .list-item {
            background: #0C111A;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border: 1px solid #1E2A3A;
        }

        .copy-mini {
            background: none;
            border: none;
            color: #6C809C;
            cursor: pointer;
            font-size: 11px;
            margin-left: 12px;
        }

        .success { color: #6FCF97; }
        .error { color: #E07A5F; }
        .info { color: #6C9BD2; }

        @media (max-width: 760px) {
            .fixed-header { padding: 12px 20px; }
            .main-container { padding: 88px 16px 32px 16px; }
            .card-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="brand"><h1>MAX</h1></div>
        <div style="text-align: right;">
            <button class="connect-wallet" id="connectWalletBtn">CONNECT WALLET</button>
            <div class="wallet-status" id="walletStatus"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="dex-card">
            <div class="card-header">
                <span class="card-title">DECENTRALIZED EXCHANGE</span>
                <select id="modeSelect" class="mode-select">
                    <option value="deploy">DEPLOY TOKEN</option>
                    <option value="pools">LIQUIDITY POOLS</option>
                    <option value="swap">SWAP ROUTER</option>
                    <option value="tokens">MY TOKENS</option>
                </select>
            </div>

            <div id="deployPanel" class="panel">
                <div class="card-title" style="margin-bottom: 20px;">DEPLOY NEW SPL TOKEN</div>
                <div class="form-row">
                    <div class="form-group"><label>TOKEN NAME</label><input type="text" id="tokenName" placeholder="Example: MAX Power" value="MAX Token"></div>
                    <div class="form-group"><label>SYMBOL</label><input type="text" id="tokenSymbol" placeholder="MAX" value="MAX"></div>
                    <div class="form-group"><label>DECIMALS</label><input type="number" id="tokenDecimals" value="9"></div>
                    <div class="form-group"><label>TOTAL SUPPLY</label><input type="number" id="tokenSupply" value="10000000"></div>
                </div>
                <button class="action-button" id="deployTokenBtn">DEPLOY TOKEN</button>
                <div id="deployStatus" class="status-area">⚡ Ready — Solana Devnet</div>
            </div>

            <div id="poolsPanel" class="panel" style="display: none;">
                <div class="card-title" style="margin-bottom: 20px;">CREATE LIQUIDITY POOL</div>
                <div class="form-row">
                    <div class="form-group"><label>TOKEN A (MINT)</label><input type="text" id="poolTokenA" placeholder="Your token mint address"></div>
                    <div class="form-group"><label>TOKEN B (DEVNET)</label><select id="poolTokenB"><option value="">— SELECT TOKEN —</option><option value="EPjFWaLb3hyccqJ1yckQWNufZi8MWYrrT4yfzJstd6M">USDC (Devnet)</option><option value="So11111111111111111111111111111111111111112">SOL (Devnet)</option></select></div>
                    <div class="form-group"><label>FEE (BPS)</label><input type="number" id="poolFee" value="30"></div>
                </div>
                <button class="action-button" id="createPoolBtn">CREATE POOL</button>
                <div id="createPoolStatus" class="status-area"></div>

                <div style="margin-top: 32px;" class="card-title">MANAGE LIQUIDITY</div>
                <div class="form-row">
                    <div class="form-group"><label>SELECT POOL</label><select id="poolSelectDropdown"><option value="">— SELECT —</option></select></div>
                    <div class="form-group"><label>ADD LIQUIDITY (AMOUNT)</label><input type="number" id="addLiquidityAmount" placeholder="Token amount"></div>
                    <div class="form-group"><label>REMOVE LP TOKENS</label><input type="number" id="removeLpAmount" placeholder="LP to burn"></div>
                </div>
                <button class="action-button" id="addLiquidityBtn" style="margin-bottom: 8px;">ADD LIQUIDITY</button>
                <button class="action-button" id="removeLiquidityBtn">REMOVE LIQUIDITY</button>
                <div id="liquidityStatus" class="status-area"></div>

                <div class="card-title" style="margin: 24px 0 12px 0;">EXISTING POOLS</div>
                <div id="poolsListArea" class="status-area">— No pools yet —</div>
            </div>

            <div id="swapPanel" class="panel" style="display: none;">
                <div class="card-title" style="margin-bottom: 20px;">SMART SWAP ROUTER</div>
                <div class="form-row">
                    <div class="form-group"><label>FROM TOKEN (SYMBOL/MINT)</label><select id="swapFromMint"><option value="">— SELECT TOKEN —</option></select></div>
                    <div class="form-group"><label>TO TOKEN (SYMBOL/MINT)</label><select id="swapToMint"><option value="">— SELECT TOKEN —</option></select></div>
                    <div class="form-group"><label>AMOUNT</label><input type="number" id="swapAmount" placeholder="0.0"></div>
                </div>
                <button class="action-button" id="estimateSwapBtn">ESTIMATE OUTPUT</button>
                <button class="action-button" id="executeSwapBtn">EXECUTE SWAP</button>
                <div id="swapResultArea" class="status-area">↻ Select tokens and amount</div>
                <div id="swapExecuteStatus" class="status-area"></div>
            </div>

            <div id="tokensPanel" class="panel" style="display: none;">
                <div class="card-title" style="margin-bottom: 20px;">DEPLOYED TOKENS</div>
                <div id="myTokensArea" class="status-area" style="max-height: 380px;">— No tokens deployed —</div>
            </div>

            <div id="tokenDetailsPanel" class="panel" style="display: none;">
                <div class="card-header">
                    <span class="card-title">TOKEN DETAILS</span>
                    <button id="backToTokensBtn" class="action-button" style="width: auto; margin-top: 0;">← BACK</button>
                </div>
                <div id="tokenDetailsContent" class="status-area" style="max-height: 500px; white-space: normal;">— Loading —</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
    <script src="https://unpkg.com/@coral-xyz/anchor@0.29.0/dist/anchor.min.js"></script>
    <script>
        (function(){
            const connection = new solanaWeb3.Connection('https://api.devnet.solana.com', 'confirmed');
            const USDC_DEVNET = 'EPjFWaLb3hyccqJ1yckQWNufZi8MWYrrT4yfzJstd6M';
            const SOL_DEVNET = 'So11111111111111111111111111111111111111112';
            const DEX_PROGRAM_ID = '36qH8uWkekoCa8qzFcBCkmZqUr9Y9JzFgtwct7RsJrTk';
            const TOKEN_PROGRAM_ID = 'TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA';

            let wallet = null;
            let deployedTokens = [];
            let pools = [];
            let selectedTokenForDetails = null;

            function loadStorage() {
                const savedTokens = localStorage.getItem('MAX_deployed');
                if(savedTokens) deployedTokens = JSON.parse(savedTokens);
                const savedPools = localStorage.getItem('MAX_pools');
                if(savedPools) pools = JSON.parse(savedPools);
                refreshPoolsUI();
                refreshMyTokensUI();
            }
            function saveTokens() { localStorage.setItem('MAX_deployed', JSON.stringify(deployedTokens)); refreshMyTokensUI(); refreshSwapTokens(); }
            function savePools() { localStorage.setItem('MAX_pools', JSON.stringify(pools)); refreshPoolsUI(); }

            function refreshSwapTokens() {
                const commonTokens = [
                    { symbol: 'USDC', mint: USDC_DEVNET },
                    { symbol: 'SOL', mint: SOL_DEVNET }
                ];
                const allTokens = [...deployedTokens, ...commonTokens];
                const fromSelect = document.getElementById('swapFromMint');
                const toSelect = document.getElementById('swapToMint');

                const fromValue = fromSelect.value;
                const toValue = toSelect.value;

                fromSelect.innerHTML = '<option value="">— SELECT TOKEN —</option>' + allTokens.map(t => `<option value="${t.mint}">${t.symbol} (${t.mint.slice(0,8)}…)</option>`).join('');
                toSelect.innerHTML = '<option value="">— SELECT TOKEN —</option>' + allTokens.map(t => `<option value="${t.mint}">${t.symbol} (${t.mint.slice(0,8)}…)</option>`).join('');

                if(fromValue) fromSelect.value = fromValue;
                if(toValue) toSelect.value = toValue;
            }

            async function getTokenMetadata(mint) {
                try {
                    const response = await fetch(`https://api.devnet.solana.com`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: 1,
                            method: 'getTokenSupply',
                            params: [mint]
                        })
                    });
                    const data = await response.json();
                    if(data.result) return data.result.value;
                    return null;
                } catch(e) { console.error('Metadata fetch failed:', e); return null; }
            }

            async function getTokenHolders(mint) {
                try {
                    const response = await fetch(`https://api.devnet.solana.com`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: 1,
                            method: 'getProgramAccounts',
                            params: [
                                TOKEN_PROGRAM_ID,
                                {
                                    encoding: 'jsonParsed',
                                    filters: [
                                        { dataSize: 165 },
                                        { memcmp: { offset: 0, bytes: mint } }
                                    ]
                                }
                            ]
                        })
                    });
                    const data = await response.json();
                    if(data.result) return data.result;
                    return [];
                } catch(e) { console.error('Holders fetch failed:', e); return []; }
            }

            function refreshMyTokensUI() {
                const container = document.getElementById('myTokensArea');
                if(!container) return;
                if(!deployedTokens.length) { container.innerHTML = '— No tokens deployed —'; return; }
                container.innerHTML = deployedTokens.map(t => `<div class="list-item"><span><b>${t.symbol}</b> / ${t.name}<br><span style="font-size:11px; color:#6C809C;">${t.mint.slice(0,28)}…</span></span><div style="display:flex; gap:8px;"><button class="copy-mini" data-mint="${t.mint}">📋 COPY</button><button class="copy-mini view-details" data-mint="${t.mint}" style="cursor:pointer; color:#6C9BD2;">👁 VIEW</button></div></div>`).join('');
                document.querySelectorAll('.copy-mini').forEach(btn => btn.addEventListener('click', (e) => { navigator.clipboard.writeText(btn.dataset.mint); alert('Mint copied'); }));
                document.querySelectorAll('.view-details').forEach(btn => btn.addEventListener('click', (e) => { showTokenDetails(btn.dataset.mint); }));
            }

            function refreshPoolsUI() {
                const container = document.getElementById('poolsListArea');
                const select = document.getElementById('poolSelectDropdown');
                if(container) {
                    if(!pools.length) container.innerHTML = '— No liquidity pools —';
                    else container.innerHTML = pools.map(p => {
                        const symbolA = p.symbolA || p.tokenA.slice(0,6);
                        const symbolB = p.symbolB || p.tokenB.slice(0,6);
                        return `<div class="list-item"><span>🔄 ${symbolA} / ${symbolB} &nbsp; fee: ${p.fee/100}%</span></div>`;
                    }).join('');
                }
                if(select) {
                    select.innerHTML = '<option value="">— SELECT POOL —</option>' + pools.map((p,idx) => {
                        const symbolA = p.symbolA || p.tokenA.slice(0,6);
                        const symbolB = p.symbolB || p.tokenB.slice(0,6);
                        return `<option value="${idx}">Pool ${idx+1}: ${symbolA}/${symbolB}</option>`;
                    }).join('');
                }
            }

            async function connectWallet() {
                if(!window.solana) { document.getElementById('walletStatus').innerHTML = '<span class="error">⚠️ No wallet extension</span>'; return; }
                try {
                    const resp = await window.solana.connect();
                    wallet = window.solana;
                    document.getElementById('connectWalletBtn').innerHTML = 'WALLET ACTIVE';
                    document.getElementById('walletStatus').innerHTML = `<span class="info">${wallet.publicKey.toString().slice(0,28)}… (devnet)</span>`;
                } catch(e) { document.getElementById('walletStatus').innerHTML = `<span class="error">Connection refused</span>`; }
            }

            async function deployToken() {
                if(!wallet) { alert('Connect wallet'); return; }

                const name = document.getElementById('tokenName').value;
                const symbol = document.getElementById('tokenSymbol').value;
                const decimals = parseInt(document.getElementById('tokenDecimals').value);
                const totalSupply = parseInt(document.getElementById('tokenSupply').value);
                const statusDiv = document.getElementById('deployStatus');

                statusDiv.innerHTML = '<span class="info">⏳ Preparing transaction...</span>';

                try {
                    // Verify wallet is still connected
                    if(!window.solana || !window.solana.publicKey) {
                        statusDiv.innerHTML = '<span class="error">❌ Wallet disconnected. Please reconnect.</span>';
                        return;
                    }

                    const mintKeypair = solanaWeb3.Keypair.generate();
                    const rent = await connection.getMinimumBalanceForRentExemption(82);

                    // Get fresh blockhash right before signing
                    statusDiv.innerHTML = '<span class="info">⏳ Getting fresh blockhash...</span>';
                    const blockhashData = await connection.getLatestBlockhash('confirmed');

                    // Create transaction with fresh blockhash
                    const transaction = new solanaWeb3.Transaction({
                        recentBlockhash: blockhashData.blockhash,
                        feePayer: wallet.publicKey
                    });

                    transaction.add(
                        solanaWeb3.SystemProgram.createAccount({
                            fromPubkey: wallet.publicKey,
                            newAccountPubkey: mintKeypair.publicKey,
                            lamports: rent,
                            space: 82,
                            programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                        })
                    );

                    // Wait and sign transaction with 20 second timeout
                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for wallet signature... (20 sec timeout)</span>';
                    let signed;
                    try {
                        const signPromise = wallet.signTransaction(transaction);
                        const timeoutPromise = new Promise((_, reject) =>
                            setTimeout(() => reject(new Error('Wallet signature timeout - Please try again')), 20000)
                        );
                        signed = await Promise.race([signPromise, timeoutPromise]);
                        // Also sign with mintKeypair (required for createAccount instruction)
                        signed.partialSign(mintKeypair);
                    } catch(walletErr) {
                        const isTimeout = walletErr.message && walletErr.message.includes('timeout');
                        const errorMsg = isTimeout ? walletErr.message : (walletErr.message || 'User rejected');
                        statusDiv.innerHTML = `<span class="error">❌ Wallet sign failed: ${errorMsg}</span>`;
                        return;
                    }

                    // Send transaction - get fresh blockhash right before sending
                    statusDiv.innerHTML = '<span class="info">⏳ Sending to network...</span>';
                    let signature;
                    let retries = 0;
                    while(retries < 3) {
                        try {
                            signature = await connection.sendRawTransaction(signed.serialize(), {
                                skipPreflight: false,
                                preflightCommitment: 'confirmed',
                                maxRetries: 3
                            });
                            break;
                        } catch(sendErr) {
                            retries++;
                            if(retries < 3 && sendErr.message && sendErr.message.includes('blockhash')) {
                                statusDiv.innerHTML = '<span class="info">⏳ Retrying transaction with fresh blockhash...</span>';
                                const newBlockhashData = await connection.getLatestBlockhash('confirmed');
                                // Rebuild transaction with new blockhash
                                const newTransaction = new solanaWeb3.Transaction({
                                    recentBlockhash: newBlockhashData.blockhash,
                                    feePayer: wallet.publicKey
                                });
                                newTransaction.add(
                                    solanaWeb3.SystemProgram.createAccount({
                                        fromPubkey: wallet.publicKey,
                                        newAccountPubkey: mintKeypair.publicKey,
                                        lamports: rent,
                                        space: 82,
                                        programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
                                    })
                                );
                                // Re-sign with both wallet and mintKeypair
                                const newSigned = await wallet.signTransaction(newTransaction);
                                newSigned.partialSign(mintKeypair);
                                signed = newSigned;
                                Object.assign(blockhashData, newBlockhashData);
                                continue;
                            }
                            throw sendErr;
                        }
                    }

                    // Wait for confirmation
                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for confirmation...</span>';
                    const confirmation = await connection.confirmTransaction({
                        signature: signature,
                        blockhash: blockhashData.blockhash,
                        lastValidBlockHeight: blockhashData.lastValidBlockHeight
                    }, 'confirmed');

                    if(confirmation.value.err) {
                        throw new Error(`Transaction failed: ${JSON.stringify(confirmation.value.err)}`);
                    }

                    // Save token data
                    deployedTokens.push({
                        mint: mintKeypair.publicKey.toString(),
                        name, symbol, decimals,
                        totalSupply: totalSupply,
                        txid: signature
                    });
                    saveTokens();

                    statusDiv.innerHTML = `
                        <span class="success">✅ Token deployed successfully!</span><br>
                        📄 Mint: ${mintKeypair.publicKey.toString()}<br>
                        🔗 <a href="https://explorer.solana.com/tx/${signature}?cluster=devnet" target="_blank" style="color:#6C9BD2">View Transaction</a><br>
                        🔗 <a href="https://explorer.solana.com/address/${mintKeypair.publicKey.toString()}?cluster=devnet" target="_blank" style="color:#6C9BD2">View Token</a>
                    `;

                } catch(e) {
                    statusDiv.innerHTML = `<span class="error">❌ ${e.message}</span>`;
                    console.error('Deployment error:', e);
                }
            }

            async function createPool() {
                if(!wallet) { alert('Connect wallet'); return; }

                const tokenA = document.getElementById('poolTokenA').value.trim();
                const tokenB = document.getElementById('poolTokenB').value.trim();
                const fee = parseInt(document.getElementById('poolFee').value);
                const statusDiv = document.getElementById('createPoolStatus');

                if(!tokenA || !tokenB) { alert('Enter token mint addresses'); return; }
                if(!solanaWeb3.PublicKey.isOnCurve(tokenA) || !solanaWeb3.PublicKey.isOnCurve(tokenB)) { alert('Invalid token addresses'); return; }

                statusDiv.innerHTML = '<span class="info">⏳ Creating pool on DEX program...</span>';

                try {
                    const poolKeypair = solanaWeb3.Keypair.generate();
                    const blockhashData = await connection.getLatestBlockhash('confirmed');

                    const transaction = new solanaWeb3.Transaction({
                        recentBlockhash: blockhashData.blockhash,
                        feePayer: wallet.publicKey
                    });

                    // Construct createPool instruction
                    const createPoolIx = new solanaWeb3.TransactionInstruction({
                        programId: new solanaWeb3.PublicKey(DEX_PROGRAM_ID),
                        keys: [
                            { pubkey: wallet.publicKey, isSigner: true, isWritable: true },
                            { pubkey: poolKeypair.publicKey, isSigner: true, isWritable: true },
                            { pubkey: new solanaWeb3.PublicKey(tokenA), isSigner: false, isWritable: false },
                            { pubkey: new solanaWeb3.PublicKey(tokenB), isSigner: false, isWritable: false },
                            { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false }
                        ],
                        data: Buffer.concat([
                            Buffer.from([0]), // createPool instruction index
                            Buffer.from(new Uint16Array([fee]).buffer)
                        ])
                    });

                    transaction.add(createPoolIx);
                    transaction.partialSign(poolKeypair);

                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for wallet signature...</span>';
                    const signed = await wallet.signTransaction(transaction);

                    statusDiv.innerHTML = '<span class="info">⏳ Sending transaction...</span>';
                    const signature = await connection.sendRawTransaction(signed.serialize());

                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for confirmation...</span>';
                    await connection.confirmTransaction({
                        signature: signature,
                        blockhash: blockhashData.blockhash,
                        lastValidBlockHeight: blockhashData.lastValidBlockHeight
                    }, 'confirmed');

                    const tokenAData = deployedTokens.find(t => t.mint === tokenA);
                    const tokenBData = deployedTokens.find(t => t.mint === tokenB);
                    const symbolA = tokenAData ? tokenAData.symbol : tokenA.slice(0,6);
                    const symbolB = tokenBData ? tokenBData.symbol : tokenB.slice(0,6);

                    pools.push({
                        tokenA, tokenB, symbolA, symbolB, fee,
                        poolAddress: poolKeypair.publicKey.toString(),
                        txid: signature,
                        reserveA: 0, reserveB: 0, totalLp: 0
                    });
                    savePools();

                    statusDiv.innerHTML = `<span class="success">✅ Pool created: ${symbolA}/${symbolB} | fee: ${fee/100}%<br>🔗 <a href="https://explorer.solana.com/tx/${signature}?cluster=devnet" target="_blank" style="color:#6C9BD2">View Tx</a></span>`;
                    document.getElementById('poolTokenA').value = '';
                    document.getElementById('poolTokenB').value = '';
                } catch(e) {
                    statusDiv.innerHTML = `<span class="error">❌ Pool creation failed: ${e.message}</span>`;
                    console.error('Pool creation error:', e);
                }
            }

            async function addLiquidity() {
                if(!wallet) { alert('Connect wallet'); return; }

                const idx = document.getElementById('poolSelectDropdown').value;
                const amount = parseFloat(document.getElementById('addLiquidityAmount').value);
                const statusDiv = document.getElementById('liquidityStatus');

                if(idx === '' || isNaN(amount) || amount <= 0) { alert('Select valid pool & amount'); return; }

                const pool = pools[parseInt(idx)];
                if(!pool) { alert('Pool not found'); return; }

                statusDiv.innerHTML = '<span class="info">⏳ Adding liquidity...</span>';

                try {
                    const blockhashData = await connection.getLatestBlockhash('confirmed');
                    const transaction = new solanaWeb3.Transaction({
                        recentBlockhash: blockhashData.blockhash,
                        feePayer: wallet.publicKey
                    });

                    // Construct addLiquidity instruction
                    const addLiquidityIx = new solanaWeb3.TransactionInstruction({
                        programId: new solanaWeb3.PublicKey(DEX_PROGRAM_ID),
                        keys: [
                            { pubkey: wallet.publicKey, isSigner: true, isWritable: true },
                            { pubkey: new solanaWeb3.PublicKey(pool.poolAddress), isSigner: false, isWritable: true }
                        ],
                        data: Buffer.concat([
                            Buffer.from([1]), // addLiquidity instruction index
                            Buffer.from(new BigUint64Array([BigInt(Math.floor(amount * 1e9))]).buffer)
                        ])
                    });

                    transaction.add(addLiquidityIx);

                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for wallet signature...</span>';
                    const signed = await wallet.signTransaction(transaction);

                    statusDiv.innerHTML = '<span class="info">⏳ Sending transaction...</span>';
                    const signature = await connection.sendRawTransaction(signed.serialize());

                    statusDiv.innerHTML = '<span class="info">⏳ Waiting for confirmation...</span>';
                    await connection.confirmTransaction({
                        signature: signature,
                        blockhash: blockhashData.blockhash,
                        lastValidBlockHeight: blockhashData.lastValidBlockHeight
                    }, 'confirmed');

                    const lpTokens = pool.totalLp === 0 ? Math.sqrt(amount*amount) : (amount / (pool.reserveA||1)) * pool.totalLp;
                    pool.reserveA += amount;
                    pool.reserveB += amount;
                    pool.totalLp += lpTokens;
                    savePools();

                    statusDiv.innerHTML = `<span class="success">✅ Liquidity added: ${amount} → ${lpTokens.toFixed(6)} LP<br>🔗 <a href="https://explorer.solana.com/tx/${signature}?cluster=devnet" target="_blank" style="color:#6C9BD2">View Tx</a></span>`;
                    document.getElementById('addLiquidityAmount').value = '';
                } catch(e) {
                    statusDiv.innerHTML = `<span class="error">❌ Add liquidity failed: ${e.message}</span>`;
                    console.error('Add liquidity error:', e);
                }
            }

            function estimateSwap() {
                const fromMint = document.getElementById('swapFromMint').value;
                const toMint = document.getElementById('swapToMint').value;
                const amount = parseFloat(document.getElementById('swapAmount').value);
                if(!fromMint || !toMint || isNaN(amount)) { document.getElementById('swapResultArea').innerHTML = '<span class="info">Enter mint addresses & amount</span>'; return; }
                const pool = pools.find(p => (p.tokenA === fromMint && p.tokenB === toMint) || (p.tokenA === toMint && p.tokenB === fromMint));
                if(!pool) { document.getElementById('swapResultArea').innerHTML = '<span class="error">No pool for this pair</span>'; return; }
                const isAtoB = pool.tokenA === fromMint;
                const reserveIn = isAtoB ? pool.reserveA : pool.reserveB;
                const reserveOut = isAtoB ? pool.reserveB : pool.reserveA;
                const amountOut = (amount * (10000 - pool.fee) / 10000 * reserveOut) / (reserveIn + amount * (10000 - pool.fee) / 10000);
                document.getElementById('swapResultArea').innerHTML = `<span class="success">↻ ESTIMATED: ${amountOut.toFixed(6)} tokens (fee ${pool.fee/100}%)</span>`;
            }

            async function showTokenDetails(mint) {
                selectedTokenForDetails = mint;

                const detailsContent = document.getElementById('tokenDetailsContent');

                const panels = {
                    deploy: document.getElementById('deployPanel'),
                    pools: document.getElementById('poolsPanel'),
                    swap: document.getElementById('swapPanel'),
                    tokens: document.getElementById('tokensPanel'),
                    details: detailsPanel
                };
                Object.values(panels).forEach(p => { if(p) p.style.display = 'none'; });
                detailsPanel.style.display = 'block';

                detailsContent.innerHTML = '<span class="info">⏳ Loading token details...</span>';

                try {
                    const supply = await getTokenMetadata(mint);
                    const holders = await getTokenHolders(mint);

                    let html = `<div style="padding: 8px; color: #E6EDF5;">`;
                    if(tokenData) {
                        html += `<div style="margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #232A36;">`;
                        html += `<div style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">${tokenData.symbol} - ${tokenData.name}</div>`;
                        html += `<div style="font-size: 11px; color: #8E9BAE; word-break: break-all; margin-bottom: 8px;">🔑 ${mint}</div>`;
                        html += `<div style="font-size: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">`;
                        html += `<div><span style="color: #A0AEC0;">Decimals:</span> <span style="color: #6FCF97;">${tokenData.decimals}</span></div>`;
                        html += `<div><span style="color: #A0AEC0;">Initial Supply:</span> <span style="color: #6FCF97;">${(tokenData.totalSupply / Math.pow(10, tokenData.decimals)).toLocaleString()}</span></div>`;

                        html += `<div style="margin-bottom: 16px; padding: 12px; background: #0A0E15; border-radius: 12px; border: 1px solid #1E2A3A;">`;
                        html += `<div style="font-size: 12px; font-weight: 600; color: #6C9BD2; margin-bottom: 8px;">📊 Current On-Chain Supply</div>`;

                        html += `</div>`;
                    }

                    html += `<div style="margin-bottom: 16px; padding: 12px; background: #0A0E15; border-radius: 12px; border: 1px solid #1E2A3A;">`;
                    html += `<div style="font-size: 12px; font-weight: 600; color: #6C9BD2; margin-bottom: 8px;">👥 Token Holders (${holders.length})</div>`;

                            const parsed = h.account.data.parsed?.info;
