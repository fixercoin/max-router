name = "max-dex"
compatibility_date = "2024-01-01"

[env.production]
route = "example.com/*"

[build]
command = "npm run build"
cwd = "./"

[env.production.build]
cwd = "./"
command = "npm run build"
watch_paths = ["src/**/*.ts", "src/**/*.tsx"]

[pages]
build_output_directory = "build"

[env.production.routes]
pattern = "/*"
custom_domain = false
