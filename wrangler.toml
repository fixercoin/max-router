name = "max-dex"
type = "javascript"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.tsx", "src/**/*.ts", "public/**/*"]

[env.production]
routes = [
  { pattern = "example.com", zone_name = "example.com" }
]

[[staticAssets]]
binding = "ASSETS"
